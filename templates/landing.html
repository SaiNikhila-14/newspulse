<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NewsPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #080c10;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 50%, rgba(0,212,255,0.07), transparent),
      radial-gradient(ellipse 60% 40% at 80% 50%, rgba(255,107,53,0.05), transparent);
    font-family: 'DM Sans', sans-serif; color: #e8edf3; padding: 24px;
  }
  .hero { text-align: center; max-width: 540px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; letter-spacing: -2px; margin-bottom: 12px; }
  .logo span { color: #00d4ff; }
  .tagline { font-size: 16px; color: #5a7a94; margin-bottom: 48px; line-height: 1.6; }
  .cards { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .card {
    width: 200px; background: #0d1117; border: 1px solid #1e2d3d;
    border-radius: 14px; padding: 28px 20px; text-align: center;
    text-decoration: none; color: inherit; transition: all 0.2s; cursor: pointer;
  }
  .card:hover { transform: translateY(-4px); }
  .card.user:hover  { border-color: #00d4ff; box-shadow: 0 12px 32px rgba(0,212,255,0.12); }
  .card.admin:hover { border-color: #ff6b35; box-shadow: 0 12px 32px rgba(255,107,53,0.12); }
  .card-icon { font-size: 32px; margin-bottom: 14px; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .card.user  .card-title { color: #00d4ff; }
  .card.admin .card-title { color: #ff6b35; }
  .card-desc { font-size: 12px; color: #5a7a94; line-height: 1.5; }
  .register-link { margin-top: 28px; font-size: 13px; color: #5a7a94; }
  .register-link a { color: #00d4ff; text-decoration: none; }
  .register-link a:hover { text-decoration: underline; }
  .dot { display: inline-block; width: 6px; height: 6px; background: #00d4ff; border-radius: 50%; margin: 0 8px; vertical-align: middle; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="hero">
  <div class="logo">News<span>Pulse</span></div>
  <p class="tagline">
    <span class="dot"></span>
    Real-time news sentiment analysis powered by machine learning
  </p>

  <div class="cards">
    <a class="card user" href="/user/login">
      <div class="card-icon">◈</div>
      <div class="card-title">User Portal</div>
      <div class="card-desc">Browse articles, explore sentiment trends and keyword analytics</div>
    </a>
    <a class="card admin" href="/admin/login">
      <div class="card-icon">⚙</div>
      <div class="card-title">Admin Portal</div>
      <div class="card-desc">Train models, run predictions and access advanced analytics</div>
    </a>
  </div>

  <div class="register-link">
    New here? <a href="/register">Create a user account</a>
  </div>
</div>
</body>
</html>
